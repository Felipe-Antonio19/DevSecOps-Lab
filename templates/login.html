<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login de Usuário</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #222222;
        color: #fff;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .card {
        width: 100%;
        max-width: 450px;
        background: rgb(29, 29, 29);
        border-radius: 16px;
        box-shadow: 0 14px 40px rgba(0,0,0,0.08);
        padding: 32px;
      }
      h1 {
        margin-top: 0;
        font-size: 1.8rem;
      }
      p {
        color: #ccc;
        margin-bottom: 24px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 16px;
        border: 1px solid #444;
        border-radius: 10px;
        background: #161616;
        color: #fff;
        font-size: 1rem;
      }
      input::placeholder {
        color: #7a7a7a;
      }
      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 18px;
      }
      .actions label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 0;
        font-size: 0.9rem;
        color: #bbb;
      }
      .actions input[type="checkbox"] {
        width: auto;
        accent-color: #0066cc;
      }
      button {
        width: 100%;
        padding: 12px 14px;
        border: none;
        border-radius: 10px;
        background: #0066cc;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #0055aa;
      }
      .helper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9rem;
        color: #aaa;
      }
      .helper a {
        color: #78b3ff;
        text-decoration: none;
      }
      .helper a:hover {
        text-decoration: underline;
      }
      .footer {
        margin-top: 24px;
        text-align: center;
        color: #888;
      }
      .footer a {
        color: #78b3ff;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Entrar no Sistema</h1>
      <p>Use seu e-mail e senha para acessar o painel do usuário.</p>

      <form method="post" action="/login">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required>

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Senha" required>

        <div class="actions">
          <label>
            <input type="checkbox" id="remember" name="remember">
            Lembrar-me
          </label>
          <a href="/forgot-password">Esqueceu a senha?</a>
        </div>

        <button type="submit">Entrar</button>
      </form>

      <div class="footer">
        Não tem conta? <a href="/register">Cadastre-se</a>
      </div>
    </div>
  </body>
</html>
