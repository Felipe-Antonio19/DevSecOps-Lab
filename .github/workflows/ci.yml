name: Continuous integration para laboratório vulneravel

on:
  push:
    branches: 
    - "**"

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.11"

      - name: Dependencias
        run: pip install -r requirements.txt
